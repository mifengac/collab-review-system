<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OA 公文池 - 材料协同办理系统</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
  <style>
    .sync-banner {
      border: 1px solid var(--border);
      background: #f6f8fa;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 12px;
    }
    .sync-banner.ok { border-color: #abefc6; background: var(--success-bg); }
    .sync-banner.partial { border-color: #fedf89; background: var(--warning-bg); }
    .sync-banner.fail { border-color: #fecdca; background: var(--danger-bg); }
    .mod-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .mod-chip {
      border: 1px solid var(--border);
      padding: 2px 8px;
      background: #fff;
      font-size: 11px;
    }
    .mod-chip.ok { border-color: #abefc6; color: var(--success); }
    .mod-chip.partial { border-color: #fedf89; color: var(--warning); }
    .mod-chip.bad { border-color: #fecdca; color: var(--danger); }
    .log-panel {
      border: 1px solid var(--border);
      background: #fff;
      margin-bottom: 12px;
      display: none;
    }
    .log-panel.show { display: block; }
    .log-item {
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      font-size: 12px;
    }
    .log-item:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <script src="/assets/js/common.js"></script>
  <script>
    if (!requireAuth()) throw new Error("redirect");
    const root = renderShell("oa", "OA 公文池");

    const MODULES = [
      { code: "todo", name: "待办公文" },
      { code: "unread", name: "待阅公文" },
      { code: "done", name: "已办公文" },
      { code: "read_done", name: "已阅公文" },
      { code: "running", name: "流转中公文" },
    ];

    let activeModule = "todo";
    let stats = [];
    let lastLog = null;
    let syncLogs = [];

    function statusLabel(st) {
      if (st === "success") return "成功";
      if (st === "partial") return "部分成功";
      if (st === "failed") return "失败";
      return st || "—";
    }

    function statusBadge(st) {
      if (st === "success") return `<span class="badge badge-done">成功</span>`;
      if (st === "partial") return `<span class="badge badge-important">部分成功</span>`;
      if (st === "failed") return `<span class="badge badge-urgent">失败</span>`;
      return `<span class="badge">${escapeHtml(st || "—")}</span>`;
    }

    function triggerLabel(t) {
      return t === "login" ? "登录自动" : t === "manual" ? "手动" : escapeHtml(t || "—");
    }

    function totalFor(code) {
      const s = stats.find((x) => x.module_code === code);
      return s ? s.count : 0;
    }

    function lastSyncText() {
      if (lastLog && lastLog.finished_at) return fmtTime(lastLog.finished_at);
      const s = stats.find((x) => x.module_code === activeModule);
      if (!s || !s.last_synced_at) return "尚未同步";
      return fmtTime(s.last_synced_at);
    }

    function bannerClass() {
      if (!lastLog) return "";
      if (lastLog.status === "success") return "ok";
      if (lastLog.status === "partial") return "partial";
      if (lastLog.status === "failed") return "fail";
      return "";
    }

    function moduleChipsFromLog(log) {
      const results = (log && log.module_results) || [];
      if (!results.length) return `<span class="hint">暂无分模块结果</span>`;
      return (
        `<div class="mod-chips">` +
        results
          .map((m) => {
            let cls = "bad";
            let extra = escapeHtml(m.error || "同步失败");
            if (m.success && m.truncated) {
              cls = "partial";
              extra = `已同步前 ${m.pages || "N"} 页，未清理旧记录 · 拉取${m.fetched}`;
            } else if (m.success && m.complete) {
              cls = "ok";
              extra = `已完整同步 · 拉取${m.fetched} / 新增${m.imported || 0} / 更新${m.updated || 0}`;
              if (m.deactivated) extra += ` / 停用${m.deactivated}`;
            } else if (m.success) {
              cls = "ok";
              extra = `拉取${m.fetched} / 新增${m.imported || 0} / 更新${m.updated || 0}`;
            }
            return `<span class="mod-chip ${cls}">${escapeHtml(m.module_name)}：${extra}</span>`;
          })
          .join("") +
        `</div>`
      );
    }

    async function loadStats() {
      try {
        stats = await api("/api/oa/stats");
      } catch {
        stats = [];
      }
    }

    async function loadLastLog() {
      try {
        const logs = await api("/api/oa/sync-logs?limit=1");
        lastLog = logs && logs.length ? logs[0] : null;
      } catch {
        lastLog = null;
      }
    }

    async function openCollab(id) {
      try {
        const item = await api("/api/oa/items/" + id + "/create-collab", {
          method: "POST",
          body: "{}",
        });
        toast("已进入协同办理", "success");
        location.href = "/item_detail.html?id=" + item.id;
      } catch (e) {
        toast(e.message, "error");
      }
    }

    function clearSyncPassword() {
      const input = document.getElementById("syncPwd");
      if (input) input.value = "";
    }

    function closeSyncModal() {
      const mask = document.getElementById("syncModalMask");
      if (mask) mask.classList.remove("show");
      clearSyncPassword();
    }

    function openSyncModal() {
      const mask = document.getElementById("syncModalMask");
      if (!mask) return;
      clearSyncPassword();
      mask.classList.add("show");
      const input = document.getElementById("syncPwd");
      if (input) setTimeout(() => input.focus(), 0);
    }

    async function submitSync() {
      const input = document.getElementById("syncPwd");
      let pwd = input ? input.value : "";
      clearSyncPassword();
      if (!pwd) {
        toast("未输入密码", "error");
        pwd = "";
        return;
      }
      const payload = JSON.stringify({ password: pwd });
      pwd = "";
      closeSyncModal();
      try {
        const r = await api("/api/oa/sync", {
          method: "POST",
          body: payload,
        });
        if (r.status === "partial") {
          toast(r.message || "部分模块同步失败，已保留成功同步的数据", "error");
        } else if (!r.success) {
          toast(r.message || "同步失败", "error");
        } else {
          toast(
            `同步完成：新增 ${r.imported}，更新 ${r.updated}，合计 ${r.total}`,
            "success"
          );
        }
        await load();
      } catch (e) {
        pwd = "";
        toast(e.message, "error");
      }
    }

    function doSync() {
      openSyncModal();
    }

    async function toggleLogs() {
      const panel = document.getElementById("logPanel");
      if (!panel) return;
      if (panel.classList.contains("show")) {
        panel.classList.remove("show");
        return;
      }
      try {
        syncLogs = await api("/api/oa/sync-logs?limit=15");
      } catch (e) {
        toast(e.message, "error");
        return;
      }
      const body = document.getElementById("logBody");
      if (!syncLogs.length) {
        body.innerHTML = `<div class="log-item hint">暂无同步记录</div>`;
      } else {
        body.innerHTML = syncLogs
          .map(
            (log) => `<div class="log-item">
              <div>
                ${fmtTime(log.finished_at || log.created_at)}
                · ${triggerLabel(log.trigger)}
                · ${statusBadge(log.status)}
                · 新增 ${log.imported} / 更新 ${log.updated} / 合计 ${log.total}
              </div>
              ${
                log.error_summary
                  ? `<div class="hint" style="margin-top:4px;color:var(--danger)">${escapeHtml(
                      log.error_summary
                    )}</div>`
                  : ""
              }
              ${moduleChipsFromLog(log)}
            </div>`
          )
          .join("");
      }
      panel.classList.add("show");
    }

    async function loadList() {
      const kw = (document.getElementById("kw") && document.getElementById("kw").value.trim()) || "";
      let url = "/api/oa/items?module_code=" + encodeURIComponent(activeModule) + "&limit=200";
      if (kw) url += "&keyword=" + encodeURIComponent(kw);
      const list = await api(url);
      const tb = document.getElementById("tbody");
      if (!list.length) {
        tb.innerHTML = `<tr><td colspan="10" class="empty-row">暂无数据。请使用「重新同步」或开启登录后自动同步。</td></tr>`;
        return;
      }
      tb.innerHTML = list
        .map(
          (r) => `<tr>
          <td title="${escapeHtml(r.title)}">${escapeHtml(r.title)}</td>
          <td>${escapeHtml(r.doc_no || "—")}</td>
          <td>${escapeHtml(r.source_unit || "—")}</td>
          <td>${escapeHtml(r.flow_name || "—")}</td>
          <td>${escapeHtml(r.step_name || "—")}</td>
          <td>${fmtTime(r.received_at)}</td>
          <td>${r.has_attach ? "是" : "否"}</td>
          <td>${fmtTime(r.synced_at)}</td>
          <td>${
            r.linked_item_id
              ? `<span class="badge badge-done">已创建 #${r.linked_item_id}</span>`
              : `<span class="badge">未创建</span>`
          }</td>
          <td>
            <button class="btn btn-sm btn-primary" type="button" data-open="${r.id}">
              ${r.linked_item_id ? "打开事项" : "进入协同办理"}
            </button>
          </td>
        </tr>`
        )
        .join("");
      tb.querySelectorAll("[data-open]").forEach((btn) => {
        btn.onclick = () => openCollab(btn.dataset.open);
      });
    }

    function renderBanner() {
      if (!lastLog) {
        return `<div class="sync-banner">最近同步：尚未有同步记录。可点击「重新同步」或开启 OA_SYNC_ON_LOGIN。</div>`;
      }
      const tip =
        lastLog.status === "partial"
          ? `<div style="margin-top:4px;color:var(--warning)">部分模块同步失败，已保留成功同步的数据。</div>`
          : lastLog.status === "failed"
          ? `<div style="margin-top:4px;color:var(--danger)">${escapeHtml(
              lastLog.error_summary || "同步失败"
            )}</div>`
          : "";
      return `<div class="sync-banner ${bannerClass()}">
        <div>
          最近同步：<strong>${fmtTime(lastLog.finished_at || lastLog.created_at)}</strong>
          · ${statusBadge(lastLog.status)}
          · ${triggerLabel(lastLog.trigger)}
          · 新增 ${lastLog.imported} / 更新 ${lastLog.updated} / 合计 ${lastLog.total}
        </div>
        ${tip}
        ${moduleChipsFromLog(lastLog)}
      </div>`;
    }

    async function load() {
      root.innerHTML = `<p class="hint">加载中…</p>`;
      try {
        await Promise.all([loadStats(), loadLastLog()]);
        root.innerHTML = `
          ${renderBanner()}
          <div class="toolbar">
            <span class="hint">当前模块记录 <strong>${totalFor(activeModule)}</strong> 条
            · 列表最近同步时间 <strong>${escapeHtml(lastSyncText())}</strong></span>
            <div class="spacer"></div>
            <input type="text" id="kw" placeholder="标题 / 文号 / 来源" style="width:200px" />
            <button class="btn" type="button" id="btnSearch">查询</button>
            <button class="btn" type="button" id="btnLogs">同步记录</button>
            <button class="btn btn-primary" type="button" id="btnSync">重新同步</button>
          </div>
          <div class="log-panel" id="logPanel">
            <div class="panel-hd" style="padding:8px 12px;border-bottom:1px solid var(--border);background:#f6f8fa;font-weight:600">
              同步记录（最近 15 条）
              <button type="button" class="btn btn-sm" id="btnCloseLogs" style="float:right">收起</button>
            </div>
            <div id="logBody"></div>
          </div>
          <div class="tabs" id="tabs">
            ${MODULES.map(
              (m) =>
                `<button type="button" data-m="${m.code}" class="${
                  m.code === activeModule ? "active" : ""
                }">${escapeHtml(m.name)} (${totalFor(m.code)})</button>`
            ).join("")}
          </div>
          <div class="panel">
            <div class="panel-hd">公文列表 · ${escapeHtml(
              (MODULES.find((m) => m.code === activeModule) || {}).name || ""
            )}</div>
            <div class="panel-bd table-wrap">
              <table class="data">
                <thead>
                  <tr>
                    <th>标题</th><th>文号</th><th>来源</th><th>流程</th><th>当前节点</th>
                    <th>收文时间</th><th>附件</th><th>同步时间</th><th>状态</th><th>操作</th>
                  </tr>
                </thead>
                <tbody id="tbody"><tr><td colspan="10" class="empty-row">加载中…</td></tr></tbody>
              </table>
            </div>
          </div>
          <p class="hint">说明：仅同步列表元数据，不下载附件/正文，不回写 OA。进入协同办理后在本系统完成审核流转。密码不写入本地存储与同步记录。</p>
          <div class="modal-mask" id="syncModalMask">
            <div class="modal" style="width:400px">
              <div class="modal-hd">
                <span>OA 重新同步</span>
                <button type="button" class="close" id="syncModalClose">&times;</button>
              </div>
              <div class="modal-bd">
                <p class="hint" style="margin-top:0">系统不保存 OA 密码。也可在登录时开启 OA_SYNC_ON_LOGIN 自动同步。</p>
                <div class="form-group">
                  <label for="syncPwd">OA 密码</label>
                  <input type="password" id="syncPwd" autocomplete="current-password" placeholder="请输入 OA 密码" />
                </div>
              </div>
              <div class="modal-ft">
                <button type="button" class="btn" id="syncModalCancel">取消</button>
                <button type="button" class="btn btn-primary" id="syncModalOk">确认同步</button>
              </div>
            </div>
          </div>
        `;

        document.getElementById("tabs").onclick = async (e) => {
          const btn = e.target.closest("button[data-m]");
          if (!btn) return;
          activeModule = btn.dataset.m;
          await load();
        };
        document.getElementById("btnSearch").onclick = () => loadList();
        document.getElementById("kw").addEventListener("keydown", (e) => {
          if (e.key === "Enter") loadList();
        });
        document.getElementById("btnSync").onclick = doSync;
        document.getElementById("btnLogs").onclick = toggleLogs;
        document.getElementById("btnCloseLogs").onclick = () => {
          document.getElementById("logPanel").classList.remove("show");
        };
        document.getElementById("syncModalClose").onclick = closeSyncModal;
        document.getElementById("syncModalCancel").onclick = closeSyncModal;
        document.getElementById("syncModalOk").onclick = submitSync;
        document.getElementById("syncPwd").addEventListener("keydown", (e) => {
          if (e.key === "Enter") submitSync();
        });
        document.getElementById("syncModalMask").addEventListener("click", (e) => {
          if (e.target.id === "syncModalMask") closeSyncModal();
        });
        await loadList();
      } catch (e) {
        root.innerHTML = `<p class="hint" style="color:var(--danger)">${escapeHtml(e.message)}</p>`;
      }
    }

    load();
  </script>
</body>
</html>
