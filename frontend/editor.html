<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>在线编辑 - 材料协同办理系统</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
  <style>
    html, body { height: 100%; margin: 0; }
    #bar {
      min-height: 40px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px 14px;
      padding: 6px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    #banner {
      width: 100%;
      margin: 0;
      padding: 6px 10px;
      background: var(--warning-bg);
      color: var(--warning);
      border: 1px solid #f5d0a9;
      border-radius: var(--radius);
      font-size: 12px;
    }
    #banner.view-only {
      background: var(--info-bg);
      color: var(--info);
      border-color: #b2ddff;
    }
    #placeholder { height: calc(100% - 72px); }
    #err { color: var(--danger); padding: 24px; }
    .meta { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div id="bar">
    <a href="javascript:history.back()">← 返回</a>
    <span id="title">加载编辑器…</span>
    <span class="meta" id="ver"></span>
    <span class="meta" id="mode"></span>
    <div id="banner" style="display:none"></div>
  </div>
  <div id="placeholder"></div>
  <div id="err" style="display:none"></div>
  <script src="/assets/js/common.js"></script>
  <script>
    if (!requireAuth()) throw new Error("redirect");

    const params = new URLSearchParams(location.search);
    const documentId = params.get("document_id") || params.get("id");
    const errEl = document.getElementById("err");
    const ph = document.getElementById("placeholder");
    const banner = document.getElementById("banner");

    function showErr(msg) {
      ph.style.display = "none";
      errEl.style.display = "block";
      errEl.textContent = msg;
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = () => resolve();
        s.onerror = () => reject(new Error("无法加载 ONLYOFFICE api.js，请确认 Document Server 已启动且 ONLYOFFICE_PUBLIC_URL 可访问"));
        document.head.appendChild(s);
      });
    }

    async function main() {
      if (!documentId) {
        showErr("缺少 document_id 参数");
        return;
      }
      try {
        const cfg = await api("/api/documents/" + documentId + "/editor-config");
        if (cfg.reserved) {
          showErr(cfg.message || "在线编辑未启用");
          return;
        }
        if (!cfg.editor_url || !cfg.config) {
          showErr("编辑配置不完整");
          return;
        }
        document.getElementById("title").textContent =
          (cfg.config.document && cfg.config.document.title) || ("文档 #" + documentId);
        const vno = cfg.version_no != null ? cfg.version_no : "—";
        document.getElementById("ver").textContent = "当前版本 v" + vno;
        document.getElementById("mode").textContent =
          "模式：" +
          (cfg.mode === "edit" ? "编辑" : cfg.mode === "review" ? "审阅（强制修订）" : "只读");

        banner.style.display = "block";
        if (cfg.track_changes_forced) {
          banner.className = "";
          banner.textContent =
            "修订模式已强制开启：修改将留下作者姓名与时间痕迹。" +
            (cfg.can_review
              ? "您可以接受或拒绝修订。"
              : "当前角色仅能以修订方式修改，不可关闭留痕。");
        } else {
          banner.className = "view-only";
          banner.textContent = cfg.message || "只读模式：不可编辑本文档。";
        }

        await loadScript(cfg.editor_url);
        if (typeof DocsAPI === "undefined" || !DocsAPI.DocEditor) {
          showErr("DocsAPI 未就绪");
          return;
        }
        // eslint-disable-next-line no-new
        new DocsAPI.DocEditor("placeholder", cfg.config);
      } catch (e) {
        showErr(e.message || String(e));
      }
    }
    main();
  </script>
</body>
</html>
